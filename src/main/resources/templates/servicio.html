<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>BeautyStyle | Servicios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .text-pink { color: #ff69b4 !important; }
        .bg-pink-gradient { background: linear-gradient(90deg, #333 0%, #ff69b4 100%) !important; }
        .table thead { background-color: #fff0f5; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-pink-gradient shadow mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">✨ BeautyStyle</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/cliente-web">Clientes</a>
            <a class="nav-link active" href="/servicio-web">Servicios</a>
            <a class="nav-link" href="/cita-web">Citas</a>
            <a class="btn btn-sm btn-outline-light ms-lg-3 mt-1" href="/">Inicio</a>
        </div>
    </div>
</nav>

<div class="container">

    <div th:if="${mensajeError}" class="alert alert-danger alert-dismissible fade show shadow-sm border-0" role="alert">
        <i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${mensajeError}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div th:if="${mensajeSuccess}" class="alert alert-success alert-dismissible fade show shadow-sm border-0" role="alert">
        <i class="bi bi-check-circle-fill"></i> <span th:text="${mensajeSuccess}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="card shadow-sm border-0 rounded-3">
        <div class="card-header bg-white py-3">
            <h2 class="text-pink mb-0 text-center">📋 Catálogo de Servicios</h2>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Servicio</th>
                        <th>Descripción</th>
                        <th>Precio</th>
                        <th>Duración</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="s : ${servicio}">
                        <td th:text="${s.id}" class="fw-bold text-muted"></td>
                        <td th:text="${s.nombre}" class="fw-bold"></td>
                        <td th:text="${s.descripcion}" class="text-secondary small"></td>
                        <td>
                            <span class="badge rounded-pill bg-success" th:text="${s.precio} + ' €'"></span>
                        </td>
                        <td>
                            <span class="text-muted"> [[${s.duracionMin}]] min</span>
                        </td>
                        <td class="text-center">
                            <div sec:authorize="hasRole('ADMIN')">
                            <a th:href="@{/servicio/editar/{id}(id=${s.id})}"
                               class="btn btn-outline-primary btn-sm me-2">
                                ✏️ Editar</a>
                            </div>
                            <div sec:authorize="hasRole('ADMIN')">
                                <a th:href="@{/servicio/eliminar/{id}(id=${s.id})}"
                                   onclick="return confirm('¿Seguro que quieres eliminar este servicio?')"
                                   class="btn btn-outline-danger btn-sm">
                                    🗑️ Eliminar</a>
                            </div>

                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="text-center mt-4 mb-5">
        <div sec:authorize="hasRole('ADMIN')">
        <a href="/servicio/nuevo" class="btn btn-info text-white shadow px-4">➕ Añadir Nuevo Servicio</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
