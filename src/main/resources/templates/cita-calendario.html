<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>BeautyStyle | Agenda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

    <style>
        .text-pink { color: #ff69b4 !important; }
        .bg-pink-gradient { background: linear-gradient(90deg, #333 0%, #ff69b4 100%) !important; }
        #calendar { background: white; padding: 20px; border-radius: 15px; border: 1px solid #ddd; min-height: 550px; }
        .fc-event { background-color: #ff69b4 !important; border: none !important; cursor: pointer; padding: 2px; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-pink-gradient shadow mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">✨ BeautyStyle</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link text-white" href="/cita-web">Listado de Citas</a>
            <a class="btn btn-sm btn-outline-light ms-lg-3" href="/">Inicio</a>
            <form th:action="@{/logout}" method="post" class="ms-lg-3">
                <button type="submit" class="btn btn-sm btn-outline-light">Cerrar Sesión</button>
            </form>
        </div>
    </div>
</nav>

<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="text-pink m-0">📅 Agenda de Citas</h2>
    <a href="/cita/nuevo" class="btn btn-pink shadow-sm px-4 fw-bold text-white" style="background-color: #ff69b4; border: none;">
        ✅ Nueva Cita
    </a>
</div>
    <div id="calendar" class="shadow-sm"></div>
</div>

<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');

        // Construcción de eventos desde Thymeleaf
        var eventosParaCalendario = [
            /*[# th:each="c : ${listaCitas}"]*/
            {
                id: [[${c.id}]],
                title: [[${c.cliente.nombre + ' - ' + c.servicio.nombre}]],
                start: [[${#temporals.format(c.fechaHora, 'yyyy-MM-dd HH:mm')}]],
                allDay: false,
                backgroundColor: '#ff69b4',
                borderColor: '#ff69b4'
            },
            /*[/]*/
        ];

        var calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'es',
            firstDay: 1, // Lunes

            // 1. TRADUCCIÓN DE BOTONES
            buttonText: {
                today: 'Hoy',
                month: 'Mes',
                week: 'Semana',
                day: 'Día'
            },

            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,timeGridWeek,timeGridDay'
            },

            // 2. NAVEGACIÓN AL PINCHAR EN EL DÍA (En lugar de ir a "Nueva Cita")
            navLinks: true, // Esto permite que los números de los días sean pinchables
            dateClick: function(info) {
                // Cambia la vista al día en el que has pinchado
                calendar.changeView('timeGridDay', info.dateStr);
            },

            events: eventosParaCalendario,

            // 3. EDICIÓN AL PINCHAR EN LA CITA
            eventClick: function(info) {
                window.location.href = "/cita/editar/" + info.event.id;
            }
        });

        calendar.render();
    });
</script>

</body>
</html>
