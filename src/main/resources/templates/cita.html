<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>BeautyStyle | Citas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Mantenemos un toque de tu rosa personalizado */
        .text-pink { color: #ff69b4 !important; }
        .bg-pink-gradient { background: linear-gradient(90deg, #333 0%, #ff69b4 100%) !important; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-pink-gradient shadow mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">✨ BeautyStyle</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/cliente-web">Clientes</a>
            <a class="nav-link" href="/servicio-web">Servicios</a>
            <a class="nav-link active" href="/cita-web">Citas</a>
            <a class="btn btn-sm btn-outline-light ms-lg-3" href="/">Inicio</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="card shadow-sm border-0 rounded-3">
        <div class="card-header bg-white py-3">
            <h2 class="text-pink mb-0 text-center">📋 Listado de Citas</h2>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Fecha</th>
                        <th>Cliente</th>
                        <th>Servicio</th>
                        <th>Observaciones</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="ci : ${cita}">
                        <td th:text="${ci.id}" class="fw-bold"></td>
                        <td th:text="${#temporals.format(ci.fechaHora, 'dd/MM/yyyy HH:mm')}"></td>
                        <td><span class="badge bg-secondary" th:text="${ci.cliente.nombre}"></span></td>
                        <td th:text="${ci.servicio.nombre}"></td>
                        <td class="small text-muted" th:text="${ci.observaciones}"></td>
                        <td class="text-center">
                            <a th:href="@{/cita/eliminar/{id}(id=${ci.id})}"
                               onclick="return confirm('¿Seguro que quieres eliminar la cita?')"
                               class="btn btn-outline-danger btn-sm">🗑️ Eliminar</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="text-center mt-4">
        <a href="/cita/nuevo" class="btn btn-primary shadow">➕ Agendar Nueva Cita</a>
    </div>
</div>

</body>
</html>
