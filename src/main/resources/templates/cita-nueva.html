<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>BeautyStyle | Gestión de Cita</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; padding-top: 50px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 550px; margin: auto; border: none; }
        .text-pink { color: #ff69b4 !important; }
        .btn-pink { background-color: #ff69b4; color: white; border: none; font-weight: bold; transition: 0.3s; }
        .btn-pink:hover { background-color: #ff4da6; color: white; transform: translateY(-2px); }
        label { font-weight: 600; color: #555; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div th:if="${mensajeError}" class="alert alert-danger alert-dismissible fade show shadow-sm mx-auto mb-3" style="max-width: 550px;" role="alert">
        <span th:text="${mensajeError}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="card">
        <h2 class="text-pink text-center mb-4">💖 <span th:text="${cita.id == null or cita.id == 0 ? 'Agendar Nueva Cita' : 'Editar Cita'}"></span></h2>

        <form th:action="@{/cita/guardar}" th:object="${cita}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="mb-4">
                <label class="form-label">👤 Cliente:</label>
                <select th:field="*{cliente}" class="form-select shadow-sm" required>
                    <option value="" disabled selected>Selecciona un cliente...</option>
                    <option th:each="c : ${listaClientes}" th:value="${c.id}" th:text="${c.nombre}"></option>
                </select>
            </div>

            <div class="mb-4">
                <label class="form-label">✨ Servicio:</label>
                <select th:field="*{servicio}" class="form-select shadow-sm" required>
                    <option value="" disabled selected>Selecciona un servicio...</option>
                    <option th:each="s : ${listaServicios}" th:value="${s.id}" th:text="${s.nombre} + ' (' + ${s.precio} + '€)'"></option>
                </select>
            </div>

            <div class="mb-4">
                <label class="form-label">📅 Fecha y Hora:</label>
                <input type="datetime-local" th:field="*{fechaHora}" class="form-control shadow-sm" required>
            </div>

            <div class="mb-4">
                <label class="form-label">📝 Observaciones:</label>
                <textarea th:field="*{observaciones}" class="form-control shadow-sm" rows="3" placeholder="Ej: Trae extensiones o alergias..."></textarea>
            </div>

            <div class="mt-4">
                <div class="row g-2">
                    <div th:class="${cita.id == null or cita.id == 0} ? 'col-12' : 'col-8'">
                        <button type="submit" class="btn btn-pink w-100 py-2 shadow-sm fw-bold">
                            Confirmar Cita
                        </button>
                    </div>

                    <div class="col-4" th:if="${cita.id != null and cita.id != 0}">
                        <a th:href="@{/cita/eliminar/{id}(id=${cita.id})}"
                           class="btn btn-outline-danger w-100 py-2 shadow-sm fw-bold"
                           onclick="return confirm('⚠️ ¿Estás seguro de que deseas cancelar esta cita? No se puede deshacer.');">
                            Eliminar
                        </a>
                    </div>
                </div>
            </div>

            <div class="text-center mt-4">
                <a href="/cita-calendario" class="text-muted small text-decoration-none">← Volver a la Agenda</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
