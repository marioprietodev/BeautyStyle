<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>BeautyStyle | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; text-align: center; }
        .container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: inline-block; }
        h1 { color: #ff69b4; }
        .menu { margin-top: 20px; }
        .btn { display: inline-block; padding: 10px 20px; margin: 10px; color: white; background: #333; text-decoration: none; border-radius: 5px; transition: 0.3s; }
        .btn:hover { background: #ff69b4; }
    </style>
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
        <div class="card-header bg-dark text-white p-4" style="background: linear-gradient(45deg, #333, #ff69b4) !important;">
            <h1 class="display-5 fw-bold mb-0">✨ BeautyStyle ERP ✨</h1>
            <p class="lead opacity-75">Sistema de Gestión Profesional de Estética</p>
        </div>

        <div class="card-body p-5 text-center">

            <div class="mb-5">
                <h4 class="text-secondary mb-4 border-bottom pb-2">📋 Consultar Registros</h4>
                <div class="d-flex flex-wrap justify-content-center gap-3">
                    <a href="/cliente-web" class="btn btn-outline-dark btn-lg px-4 shadow-sm">👥 Clientes</a>
                    <a href="/servicio-web" class="btn btn-outline-dark btn-lg px-4 shadow-sm">💄 Servicios</a>
                    <a href="/cita-web" class="btn btn-outline-dark btn-lg px-4 shadow-sm">📅 Citas</a>
                    <a href="/cita-calendario" class ="btn btn-outline-dark btn-lg px-4 shadow-sm">Agenda</a>
                </div>
            </div>

            <hr class="my-5 opacity-25">

            <div>
                <h4 class="text-secondary mb-4 border-bottom pb-2">➕ Acciones Rápidas</h4>
                <div class="d-flex flex-wrap justify-content-center gap-3">
                    <a href="/cliente-nuevo" class="btn btn-success btn-lg px-4 shadow-sm">👤 Nuevo Cliente</a>
                    <a href="/servicio/nuevo" class="btn btn-info text-white btn-lg px-4 shadow-sm">💅 Nuevo Servicio</a>
                    <a href="/cita/nuevo" class="btn btn-primary btn-lg px-4 shadow-sm">📅 Agendar Cita</a>
                </div>
            </div>

        </div>

        <div class="card-footer bg-white text-muted py-3 d-flex justify-content-between align-items-center px-4">
            <small>© 2026 BeautyStyle Management System | Cádiz, España</small>

            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-sm btn-outline-danger border-0 fw-bold" style="background: none; color: #dc3545;">
                    🚪 Cerrar Sesión
                </button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
